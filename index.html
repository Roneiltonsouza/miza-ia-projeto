<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miza IA - Gerador de Apps</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #FF0000 0%, #FFFFFF 50%, #800080 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button#btn-gerar {
            width: 100%;
            background: #800080;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #preview-container {
            width: 100%;
            height: 300px;
            background: white;
            border: 2px solid #800080;
            border-radius: 10px;
            margin-top: 10px;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-sec { flex: 1; padding: 10px; border: 1px solid #800080; border-radius: 10px; background: none; color: #800080; cursor: pointer; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 style="color: #800080; margin-top: 0;">Miza IA</h2>
        <input type="text" id="prompt" placeholder="Ex: Cria um Aplicativo O nome miza">
        <button id="btn-gerar" onclick="executarGeracao()">GERAR APP</button>

        <div id="preview-container">
            <iframe id="tela"></iframe>
        </div>

        <div class="btn-row">
            <button class="btn-sec" onclick="copiar()">Copiar</button>
            <button class="btn-sec" onclick="baixar()">Baixar</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // CHAVE API ATUALIZADA
        const API_KEY = "AIzaSyATF0fUAFvbSr7qFIMypTgbncKV5etmalw";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        let ultimoCodigo = "";

        // Lock de Persistência [cite: 2026-02-26]
        window.onload = () => {
            const salvo = localStorage.getItem('miza_app_code');
            if(salvo) {
                ultimoCodigo = salvo;
                atualizarIframe(salvo);
            }
        };

        window.executarGeracao = async () => {
            const p = document.getElementById('prompt').value;
            const b = document.getElementById('btn-gerar');
            if(!p) return;

            b.innerText = "PROCESSANDO...";
            try {
                const promptFinal = `Crie um código HTML5 completo (com CSS e JS) para um app chamado Miza que faça: ${p}. Responda apenas com o código puro.`;
                const result = await model.generateContent(promptFinal);
                const response = await result.response;
                ultimoCodigo = response.text().replace(/```html|```/g, '');
                
                localStorage.setItem('miza_app_code', ultimoCodigo);
                atualizarIframe(ultimoCodigo);
            } catch (err) {
                console.error(err);
                alert("Erro crítico: Verifique se sua chave API permite acesso da sua região atual ou se há restrições de segurança no Google Cloud.");
            } finally {
                b.innerText = "GERAR APP";
            }
        };

        function atualizarIframe(html) {
            const blob = new Blob([html], { type: 'text/html' });
            document.getElementById('tela').src = URL.createObjectURL(blob);
        }

        window.copiar = () => { navigator.clipboard.writeText(ultimoCodigo); alert("Copiado!"); };
        window.baixar = () => {
            const a = document.createElement('a');
            a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(ultimoCodigo);
            a.download = 'miza_app.html';
            a.click();
        };
    </script>
</body>
</html>
